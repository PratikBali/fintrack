# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
  # Set GOOGLE_GENAI_API_KEY in Firebase App Hosting secrets for receipt scan
# Required for Firebase Authentication. Specifies the ingress for session cookies.
# https://firebase.google.com/docs/hosting/manage-cache#using_cookies
headers:
  - source: /
    headers:
      - key: Vary
        value: Authorization,Accept-Encoding,Cookie
